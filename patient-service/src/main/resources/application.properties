spring.application.name=patient-service
server.port=4000

spring.datasource.embedded-database-connection=none

spring.datasource.url=jdbc:postgresql://localhost:5432/patient_db
spring.datasource.username=postgres
spring.datasource.password=password

spring.main.allow-bean-definition-overriding=true

eureka.client.serviceUrl.default=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.config.import=configserver:http://localhost:4006