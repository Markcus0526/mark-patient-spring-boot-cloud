spring.application.name=config-server
server.port=8888

spring.main.allow-bean-definition-overriding=true

eureka.client.serviceUrl.default=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

#spring.cloud.config.server.git.uri=https://github.com/Markcus0526/mark-patient-spring-boot-cloud/application-config//application.propertices
# Git Configuration (Point to the REPO, not the file)
spring.cloud.config.server.git.uri=https://github.com
# Tell the server to look inside your subfolder
spring.cloud.config.server.git.search-paths=application-config
# Set the branch (usually main or master)
spring.cloud.config.server.git.default-label=main